<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Lista de Leads</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min
.css" rel="stylesheet">
</head>

<body class="p-4">
    <h2>Leads Registrados <a href="nuevo-lead.html" class="btn btn-sm
btn-dark">+ Nuevo</a></h2>
    <table class="table mt-3">

        <thead>
            <tr>
                <th>Nombre</th>
                <th>Empresa</th>
                <th>Estado</th>
                <th>Acción</th>
                < /tr>
        </thead>
        <tbody id="tabla-body"></tbody>
    </table>
    <hr>
    <h4>Práctica GET (API Real)</h4>
    <button id="btn-api-get" class="btn btn-outline-secondary">Cargar
        usuarios de API pública</button>
    <ul id="lista-api" class="mt-2"></ul>
    <script src="leads.js"></script>
    <script>
        // 1. Pintar tabla local
        function pintarTabla() {
            const leads = obtenerLeads();
            const tbody = document.getElementById('tabla-body');
            tbody.innerHTML = '';
            leads.forEach(lead => {
                tbody.innerHTML += `
 <tr>
 <td>${lead.nombre}</td>
 <td>${lead.empresa}</td>
 <td><span class="badge bgprimary">${lead.estado}</span></td>
 <td><button class="btn btn-sm btn-danger"
onclick="borrar(${lead.id})">X</button></td>
 </tr>
 `;
            });
        }
        function borrar(id) {
            eliminarLead(id);
            pintarTabla();
        }
        pintarTabla();
        // 2. Cargar de API real (fetch GET)
        document.getElementById('btn-api-get').addEventListener('click',
            async function () {
                try {
                    const res = await
                        fetch('https://jsonplaceholder.typicode.com/users');
                    const usuarios = await res.json();
                    const ul = document.getElementById('lista-api');
                    ul.innerHTML = '';
                    usuarios.forEach(u => ul.innerHTML += `<li>${u.name}
(${u.email})</li>`);
                } catch (error) {
                    console.error(error);
                }
            });
    </script>
</body>

</html>
