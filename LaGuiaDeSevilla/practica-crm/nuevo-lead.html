<!DOCTYPE html> 
<html lang="es"> 
<head>     
    <meta charset="UTF-8">     
    <title>Nuevo Lead</title>     
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"> 
</head> 
<body class="p-4">     
    <h2>Añadir Lead</h2>     
    <form id="form-lead" class="mb-5">         
        <input type="text" id="nombre" class="form-control mb-2" 
placeholder="Nombre" required>
        
        <input type="text" id="empresa" class="form-control mb-2" 
placeholder="Empresa" required>         
        <button type="submit" class="btn btn-dark">Guardar Lead</button>         
        <a href="lista-leads.html" class="btn btn-link">Ver lista</a>     
    </form>       
    
    
    <hr>     
    <h4>Práctica POST (API Real)</h4>     
    <button id="btn-api" class="btn btn-outline-secondary">Enviar a API 
        pública</button>     
        <pre id="resultado-api" class="mt-2"></pre>       
        
        <script src="leads.js"></script>    
        
        <script>        
         // 1. Guardar en local         
         document.getElementById('form-lead').addEventListener('submit', 
         function(e) {             
            e.preventDefault();            
            const nombre = document.getElementById('nombre').value; 
                       
            const empresa = document.getElementById('empresa').value;             
            guardarLead({ nombre,empresa });             
            alert('Guardado. Ve a la lista para verlo.');        
             });           
             // 2. Enviar a API real (fetch POST)         
             document.getElementById('btn-api').addEventListener('click', 
             async function() {             
                try {                 
                    const res = await 
                    fetch('https://jsonplaceholder.typicode.com/posts', {  
                                method: 'POST',                     
                                headers: { 'Content-Type': 'application/json' },     
                                body: JSON.stringify({ title: 'Prueba', body: 'Lead enviado' })                
                                 });                
                                const datos = await res.json();                 
                                document.getElementById('resultado-api').textContent = 
                                'ID asignado por el servidor: ' + datos.id;             
                                } catch (error) {                 
                                    console.error(error);             
                                    }         
                                });     
                        </script> 
            </body> 
    </html>
